<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walterex & Braxx</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        section {
            padding: 20px;
            animation: fadeIn 1s;
        }
        .animation {
            animation: slideIn 1s;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: #333;
            color: #fff;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to Walterex & Braxx</h1>
    </header>
    <section class="animation">
        <h2>About Us</h2>
        <p>Walterex y Braxx son provedores líder de soluciones tecnológicas innovadoras, tambien se especializan en un servicio al cliente de alta calidad.</p>
    </section>
    <footer>
        <p>&copy; 2026 Walterex & Braxx. All rights reserved.</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Document is ready');
            // Add more JavaScript functionality here if needed
        });
    </script>
</body>
</html>
